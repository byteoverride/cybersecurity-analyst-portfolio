title: BITSAdmin File Transfer
id: 5d2f9e7b-3c4a-4b8d-9e1f-6a5b4c3d2e1f
status: experimental
description: |
    Detects bitsadmin.exe used to transfer files. Background Intelligent Transfer Service
    (BITS) is a legitimate Windows component for managed downloads — attackers abuse it
    because BITS jobs persist across reboots, run with SYSTEM privileges, and bypass
    many host-based network monitors.
references:
    - https://attack.mitre.org/techniques/T1197/
    - https://lolbas-project.github.io/lolbas/Binaries/Bitsadmin/
author: Psalms (@byteoverride)
date: 2026/05/15
tags:
    - attack.persistence
    - attack.defense-evasion
    - attack.t1197
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\bitsadmin.exe'
        CommandLine|contains:
            - '/transfer'
            - '/create'
            - '/addfile'
    condition: selection
falsepositives:
    - Windows Update operations (typically run by SYSTEM, filter by parent process)
    - Legitimate software update mechanisms using BITS
level: medium
